name: Simple Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR="$(sudo systemctl show -p WorkingDirectory --value movieapp 2>/dev/null || true)"

            if [ -z "$APP_DIR" ]; then
              for candidate in /home/ubuntu/Two-heartes /home/ubuntu/ShowGO-Backend; do
                if [ -d "$candidate" ]; then
                  APP_DIR="$candidate"
                  break
                fi
              done
            fi

            if [ -z "$APP_DIR" ]; then
              echo "Could not determine backend directory."
              echo "Checked movieapp WorkingDirectory and common paths:"
              echo "  - /home/ubuntu/Two-heartes"
              echo "  - /home/ubuntu/ShowGO-Backend"
              exit 1
            fi

            echo "Using backend directory: $APP_DIR"
            cd "$APP_DIR"

            echo " Pulling latest code..."
            git pull origin main

            echo " Restarting service..."
            sudo systemctl restart movieapp

            echo " Deployment completed"

            echo " Last logs (optional):"
            sudo journalctl -u movieapp -n 20 --no-pager
